{% extends 'dashboard/base.html' %}

{% block content %}

<h2 class="page-title">Manage Students</h2>

<form method="POST" class="filter-form">
    {% csrf_token %}

    <select id="class-select" name="class" required>
        <option value="">Select Class</option>
        {% for c in classes %}
            <option value="{{ c.id }}"
            {% if selected_class == c.id|stringformat:"s" %}selected{% endif %}>
                {{ c }}
            </option>
        {% endfor %}
    </select>

    <select id="section-select" name="section" required>
        <option value="">Select Section</option>
        {% for s in sections %}
            <option value="{{ s.id }}"
            {% if selected_section == s.id|stringformat:"s" %}selected{% endif %}>
                {{ s.name }}
            </option>
        {% endfor %}
    </select>

    <button type="submit" class="btn-primary">Load Students</button>
</form>

{% if students %}
<div class="card">
    <table class="table">
        <tr>
            <th>Roll</th>
            <th>Name</th>
            <th>Class</th>
            <th>Section</th>
            <th>Actions</th>
        </tr>

        {% for s in students %}
        <tr>
            <td>{{ s.roll_number }}</td>
            <td>{{ s.name }}</td>
            <td>{{ s.student_class }}</td>
            <td>{{ s.section }}</td>

            <td>
                <a href="{% url 'edit_student' s.id %}" class="btn-edit">Edit</a>
                <form method="POST" action="{% url 'delete_student' s.id %}" style="display:inline;">
                  {% csrf_token %}
                    <button type="submit" class="btn-delete"
                         onclick="return confirm('Delete this student?')">
                          Delete
                    </button>
                </form>
                   
            </td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endif %}

<!--  CLASS → SECTION DYNAMIC -->
<script>
document.getElementById("class-select").addEventListener("change", function() {
    const classId = this.value;
    const sectionDropdown = document.getElementById("section-select");

    sectionDropdown.innerHTML = '<option>Loading...</option>';

    fetch(`/dashboard/get-sections/?class_id=${classId}`)
        .then(response => response.json())
        .then(data => {
            sectionDropdown.innerHTML = '<option value="">Select Section</option>';

            data.forEach(section => {
                sectionDropdown.innerHTML += 
                    `<option value="${section.id}">${section.name}</option>`;
            });
        });
});
</script>

{% endblock %}
