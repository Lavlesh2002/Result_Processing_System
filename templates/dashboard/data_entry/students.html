{% extends 'dashboard/base.html' %}

{% block content %}

<h2>Students</h2>

<a href="{% url 'add_student' %}" class="btn-primary">+ Add Student</a>

<table class="table">
    <tr>
        <th>Name</th>
        <th>Roll No</th>
        <th>Class</th>
        <th>Section</th>
        <th>Action</th>
    </tr>

    {% for s in students %}
    <tr>
        <td>{{ s.name }}</td>
        <td>{{ s.roll_number }}</td>
        <td>{{ s.student_class }}</td>
        <td>{{ s.section }}</td>
        <td>
        <a href="{% url 'edit_student' s.id %}" class="btn-primary">Edit</a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
