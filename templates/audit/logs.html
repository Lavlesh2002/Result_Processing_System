{% extends 'dashboard/base.html' %}

{% block content %}

<h2 class="page-title">Audit Logs</h2>

<div class="card">
    <table class="table">
        <tr>
            <th>User</th>
            <th>Action</th>
            <th>Model</th>
            <th>Time</th>
        </tr>

        {% for log in logs %}
        <tr>
            <td>{{ log.user }}</td>
            <td>{{ log.action }}</td>
            <td>{{ log.model_name }}</td>
            <td>{{ log.timestamp }}</td>
        </tr>
        {% endfor %}
    </table>
</div>

{% endblock %}
